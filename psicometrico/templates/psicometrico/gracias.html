<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Listo! — Loansi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .gracias-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .check-circle {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .check-circle i { font-size: 2.5rem; color: white; }
        .gracias-title { font-size: 1.5rem; font-weight: 700; color: #212529; margin-bottom: 1rem; }
        .gracias-text { font-size: 1rem; color: #6c757d; line-height: 1.6; margin-bottom: 1.5rem; }
        .brand-footer { color: #0d6efd; font-weight: 700; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="gracias-card">
    <div class="check-circle">
        <i class="bi bi-check-lg"></i>
    </div>

    <h1 class="gracias-title">
        {% if nombre %}
            ¡Listo, {{ nombre }}!
        {% else %}
            ¡Listo!
        {% endif %}
    </h1>

    <p class="gracias-text">
        Recibimos tus respuestas. Un asesor revisará tu solicitud y te contactaremos
        por WhatsApp en menos de <strong>24 horas hábiles</strong>.
    </p>

    <hr class="my-3">

    <div class="brand-footer">
        <i class="bi bi-shield-check me-1"></i> Loansi
    </div>
</div>

</body>
</html>
